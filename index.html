<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股盤整主力追蹤</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0f14;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 16px;
  }
  .header {
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .title { font-size: 20px; font-weight: 700; color: #cc8cff; }
  .subtitle { font-size: 12px; color: #666; margin-top: 4px; }
  .update-time { font-size: 11px; color: #555; margin-top: 8px; }

  /* 籌碼評分說明 */
  .score-legend {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
  }
  .score-legend-title {
    font-size: 12px; font-weight: 700;
    color: #cc8cff; margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .score-items {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .score-item {
    font-size: 11px; color: #888;
    display: flex; align-items: center; gap: 6px;
  }
  .score-dot {
    width: 6px; height: 6px;
    border-radius: 50%; flex-shrink: 0;
  }
  .dot-green  { background: #69db7c; }
  .dot-blue   { background: #4ea8de; }
  .dot-yellow { background: #ffd43b; }

  .no-data { color: #666; text-align: center; padding: 40px; }

  /* 區塊標題 */
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; margin-top: 24px;
  }
  .section-header:first-of-type { margin-top: 0; }
  .section-label {
    font-size: 13px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px;
  }
  .label-strict {
    background: rgba(204,140,255,0.15);
    color: #cc8cff;
    border: 1px solid rgba(204,140,255,0.3);
  }
  .label-loose {
    background: rgba(100,100,100,0.2);
    color: #aaa;
    border: 1px solid rgba(100,100,100,0.3);
  }
  .section-count { font-size: 12px; color: #555; }

  /* 卡片 */
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-strict { border-left: 3px solid rgba(204,140,255,0.6); }
  .card-loose  { border-left: 3px solid rgba(100,100,100,0.4); }

  .card-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 12px;
  }
  .stock-name { font-size: 16px; font-weight: 700; color: #fff; }
  .stock-code { font-size: 12px; color: #888; margin-top: 2px; }

  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 12px;
  }
  .badge-chip-high { background: rgba(105,219,124,0.15); color: #69db7c; border: 1px solid rgba(105,219,124,0.3); }
  .badge-chip-mid  { background: rgba(78,168,222,0.15);  color: #4ea8de; border: 1px solid rgba(78,168,222,0.3); }
  .badge-chip-low  { background: rgba(232,200,64,0.15);  color: #e8c840; border: 1px solid rgba(232,200,64,0.3); }
  .zone-bottom { background: rgba(105,219,124,0.15); color: #69db7c; border: 1px solid rgba(105,219,124,0.3); }
  .zone-mid    { background: rgba(78,168,222,0.15);  color: #4ea8de; border: 1px solid rgba(78,168,222,0.3); }
  .zone-top    { background: rgba(255,200,0,0.15);   color: #ffd43b; border: 1px solid rgba(255,200,0,0.3); }

  /* 指標格 */
  .metrics {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 12px;
  }
  .metric {
    background: rgba(255,255,255,0.04);
    border-radius: 8px; padding: 8px; text-align: center;
  }
  .metric-label { font-size: 10px; color: #666; margin-bottom: 4px; }
  .metric-value { font-size: 14px; font-weight: 700; }
  .positive { color: #69db7c; }
  .negative { color: #ff6b6b; }
  .neutral  { color: #e0e0e0; }
  .warning  { color: #ffd43b; }
  .purple   { color: #cc8cff; }

  /* 區間視覺化 */
  .range-bar-wrap { margin-bottom: 12px; }
  .range-label {
    display: flex; justify-content: space-between;
    font-size: 10px; color: #666; margin-bottom: 4px;
  }
  .range-bar {
    background: rgba(255,255,255,0.06);
    border-radius: 4px; height: 8px;
    position: relative; overflow: visible;
  }
  .range-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #69db7c33, #4ea8de33);
  }
  .range-marker {
    position: absolute; top: -3px;
    width: 3px; height: 14px;
    background: #fff; border-radius: 2px;
  }

  /* 進場後表現 */
  .entry-box {
    display: flex; justify-content: space-between;
    padding: 8px 12px; border-radius: 8px;
    font-size: 12px; margin-bottom: 12px;
  }
  .entry-profit { background: rgba(105,219,124,0.08); border: 1px solid rgba(105,219,124,0.2); }
  .entry-loss   { background: rgba(255,100,100,0.08); border: 1px solid rgba(255,100,100,0.2); }
  .entry-na     { background: rgba(100,100,100,0.08); border: 1px solid rgba(100,100,100,0.2); }

  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 10px 0; }
  .section-title {
    font-size: 11px; color: #666; letter-spacing: 1px;
    margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  /* 主力明細 */
  .broker-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px; padding: 10px; margin-bottom: 8px;
  }
  .broker-header {
    display: flex; justify-content: space-between;
    margin-bottom: 8px; font-size: 12px;
  }
  .broker-name { color: #cc8cff; font-weight: 700; }
  .broker-meta { color: #666; font-size: 11px; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th {
    color: #666; font-weight: 500; padding: 5px 6px;
    text-align: right; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  th:first-child { text-align: left; }
  td { padding: 5px 6px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.04); }
  td:first-child { text-align: left; color: #888; }

  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 10px; padding: 2px 8px;
    border-radius: 6px; background: rgba(255,255,255,0.05); color: #888;
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">台股盤整主力追蹤</div>
  <div class="subtitle">均線糾結 · 量能放大 · 主力異動 · 籌碼一致性</div>
  <div class="update-time" id="update-time">載入中...</div>
</div>

<!-- 籌碼評分說明 -->
<div class="score-legend">
  <div class="score-legend-title">📊 籌碼一致性評分說明（滿分10分）</div>
  <div class="score-items">
    <div class="score-item"><div class="score-dot dot-green"></div>投信10日買超 +2分</div>
    <div class="score-item"><div class="score-dot dot-green"></div>外資10日買超 +2分</div>
    <div class="score-item"><div class="score-dot dot-green"></div>主力券商出現 +2分</div>
    <div class="score-item"><div class="score-dot dot-blue"></div>投信+外資同向 +1分</div>
    <div class="score-item"><div class="score-dot dot-blue"></div>主力連買≥3日 +1分</div>
    <div class="score-item"><div class="score-dot dot-blue"></div>主力加速≥60% +1分</div>
    <div class="score-item"><div class="score-dot dot-yellow"></div>股價在60MA之上 +1分</div>
  </div>
</div>

<div id="content">
  <div class="no-data">載入資料中...</div>
</div>

<script>
fetch('data.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('update-time').textContent =
      '更新時間：' + data.update_time;

    const content = document.getElementById('content');
    if (!data.stocks || data.stocks.length === 0) {
      content.innerHTML = '<div class="no-data">今日無符合條件股票</div>';
      return;
    }

    const strict = data.stocks.filter(s => s['盤整等級'] === '精選');
    const loose  = data.stocks.filter(s => s['盤整等級'] === '觀察');

    const renderCards = (stocks, cardClass) => stocks.map(s => {
      const chip = parseInt(s['籌碼一致性']) || 0;
      const chipClass = chip >= 8 ? 'badge-chip-high' : chip >= 6 ? 'badge-chip-mid' : 'badge-chip-low';

      const zone = s['盤整位置'];
      const zoneClass = zone==='下緣' ? 'zone-bottom' : zone==='上緣' ? 'zone-top' : 'zone-mid';
      const zoneText  = zone==='下緣' ? '▼ 下緣' : zone==='上緣' ? '▲ 上緣' : '● 中段';

      const high   = parseFloat(s['區間上緣']);
      const low    = parseFloat(s['區間下緣']);
      const close  = parseFloat(s['收盤價(還原)']);
      const posPct = high > low ? ((close - low) / (high - low) * 100).toFixed(0) : 50;

      const volRatio = parseFloat(s['今日量比']);
      const volClass = volRatio >= 1.5 ? 'positive' : volRatio >= 1.0 ? 'warning' : 'neutral';

      const entryRet = parseFloat(s['主力進場後漲跌%']);
      let entryClass = 'entry-na', entryText = '無主力進場資料';
      if (!isNaN(entryRet)) {
        entryClass = entryRet >= 0 ? 'entry-profit' : 'entry-loss';
        entryText  = `主力進場後 ${entryRet>=0?'+':''}${entryRet}%`;
      }

      const majorHtml = (s.major_daily || []).map(broker => {
        const rows = (broker['明細'] || []).map(d =>
          `<tr>
            <td>${d['日期']}</td>
            <td style="color:${d['買超張']>0?'#69db7c':'#ff6b6b'}">${d['買超張']>0?'+':''}${d['買超張']}</td>
            <td>${d['均買價']||'—'}</td>
            <td>${d['均賣價']||'—'}</td>
            <td>${d['還原收盤']||'—'}</td>
          </tr>`
        ).join('');
        return `
        <div class="broker-card">
          <div class="broker-header">
            <span class="broker-name">▶ ${broker['券商']}</span>
            <span class="broker-meta">連買${broker['連買日']}日 加速${broker['加速%']}%</span>
          </div>
          <table>
            <tr><th>日期</th><th>買超張</th><th>均買價</th><th>均賣價</th><th>還原收盤</th></tr>
            ${rows}
          </table>
        </div>`;
      }).join('');

      return `
      <div class="card ${cardClass}">
        <div class="card-header">
          <div>
            <div class="stock-name">${s['名稱']}</div>
            <div class="stock-code">${s['代碼']}</div>
          </div>
          <div class="badge-row">
            <span class="badge ${chipClass}">籌碼 ${s['籌碼一致性']}</span>
            <span class="badge ${zoneClass}">${zoneText}</span>
          </div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-label">收盤(還原)</div>
            <div class="metric-value neutral">${s['收盤價(還原)']}</div>
          </div>
          <div class="metric">
            <div class="metric-label">今日量比</div>
            <div class="metric-value ${volClass}">${s['今日量比']}x</div>
          </div>
          <div class="metric">
            <div class="metric-label">均線糾結</div>
            <div class="metric-value ${parseFloat(s['均線糾結%'])<3?'positive':'neutral'}">${s['均線糾結%']}%</div>
          </div>
          <div class="metric">
            <div class="metric-label">20日波動</div>
            <div class="metric-value ${parseFloat(s['20日波動%'])<8?'positive':'neutral'}">${s['20日波動%']}%</div>
          </div>
          <div class="metric">
            <div class="metric-label">外資方向</div>
            <div class="metric-value ${s['外資方向']==='買'?'positive':'negative'}">
              ${s['外資方向']==='買'?'▲ 買':'▼ 賣'}
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">投信方向</div>
            <div class="metric-value ${s['投信方向']==='買'?'positive':'negative'}">
              ${s['投信方向']==='買'?'▲ 買':'▼ 賣'}
            </div>
          </div>
        </div>

        <div class="range-bar-wrap">
          <div class="range-label">
            <span>下緣 ${s['區間下緣']}</span>
            <span>現價位置 ${posPct}%</span>
            <span>上緣 ${s['區間上緣']}</span>
          </div>
          <div class="range-bar">
            <div class="range-fill" style="width:100%"></div>
            <div class="range-marker" style="left:calc(${posPct}% - 1px)"></div>
          </div>
        </div>

        <div class="entry-box ${entryClass}">
          <span>主力最早進場：${s['主力最早進場日']||'—'}</span>
          <span>${entryText}</span>
        </div>

        <hr class="divider">

        <div class="section-title">主力券商每日明細</div>
        ${majorHtml || '<div style="color:#666;font-size:12px">無主力資料</div>'}

        <div class="tag-row">
          <span class="tag">波動 ${s['20日波動%']}%</span>
          <span class="tag">量縮比 ${s['量縮比']}</span>
          <span class="tag">近3日量比 ${s['近3日量比']}x</span>
          <span class="tag">投信連買 ${s['投信連買日']}日</span>
          <span class="tag">主力 ${s['主力家數']}家</span>
          ${s['出現主力'] ? `<span class="tag" style="color:#cc8cff">★ ${s['出現主力']}</span>` : ''}
        </div>

        <div class="tag-row" style="margin-top:6px">
          <span class="tag">5MA ${s['5MA']}</span>
          <span class="tag">20MA ${s['20MA']}</span>
          <span class="tag">60MA ${s['60MA']}</span>
        </div>
      </div>`;
    }).join('');

    content.innerHTML = `
      <div class="section-header">
        <span class="section-label label-strict">精選盤整</span>
        <span class="section-count">${strict.length} 檔｜波動<10% 糾結<5%</span>
      </div>
      ${strict.length > 0
        ? renderCards(strict, 'card-strict')
        : '<div class="no-data" style="padding:20px">今日無精選盤整股有主力異動</div>'
      }
      <div class="section-header">
        <span class="section-label label-loose">觀察名單</span>
        <span class="section-count">${loose.length} 檔｜波動<15% 糾結<8%</span>
      </div>
      ${loose.length > 0
        ? renderCards(loose, 'card-loose')
        : '<div class="no-data" style="padding:20px">今日無觀察名單有主力異動</div>'
      }
    `;
  })
  .catch(() => {
    document.getElementById('update-time').textContent = '尚無資料';
    document.getElementById('content').innerHTML =
      '<div class="no-data">尚未有今日資料，請稍後再試</div>';
  });
</script>
</body>
</html>
